# release-crates — publishes the Rust crate to crates.io on STABLE release tags
# only. No long-lived token is stored: crates.io Trusted Publishing exchanges the
# workflow's OIDC identity (`id-token: write`) for a short-lived API token via
# rust-lang/crates-io-auth-action.
#
# crates.io versions are immutable and permanent, so nightly prereleases (tags
# carrying a '-') are intentionally skipped — only clean stable tags (v0.1.x /
# v1.0.0) publish. cargo builds src/parser.c from source via the cc crate, so no
# prebuilt artifact is needed. Re-publishing an existing version is skipped.
#
# This repository is a generated mirror — edit the source in the masterbelt
# monorepo (toolchain/grammars/tree-sitter-masterbelt/.github), not here.
name: release-crates

on:
  push:
    tags: ['v*']

concurrency:
  group: release-crates-${{ github.ref }}

permissions:
  contents: read
  id-token: write # OIDC for crates.io Trusted Publishing

jobs:
  publish:
    if: ${{ !contains(github.ref_name, '-') }} # stable tags only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # dtolnay/rust-toolchain selects the toolchain by its ref (`stable`), so it
      # is intentionally a branch ref, not a SHA pin — it tracks stable Rust.
      - uses: dtolnay/rust-toolchain@stable
      # OIDC — no token. Requires a Trusted Publisher configured on crates.io for
      # this repo + workflow; the action mints a short-lived token into its output.
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish 2>err \
            || { grep -qiE "already (exists|uploaded)|is already uploaded|crate version .* is already" err \
                 && echo "crates.io: version already published — skipping" \
                 || { cat err >&2; exit 1; }; }
          rm -f err
