# release-pypi — publishes the Python distribution to PyPI on STABLE release tags
# only. No long-lived token is stored: it uses PyPI Trusted Publishing (OIDC, the
# `id-token: write` permission and the `pypi` environment).
#
# PyPI versions are immutable, so nightly prereleases (tags carrying a '-') are
# skipped — only clean stable tags (v0.1.x / v1.0.0) publish. Binary wheels are
# prebuilt with cibuildwheel across OS × CPython so consumers need no compiler;
# an sdist is shipped alongside for source builds.
#
# This repository is a generated mirror — edit the source in the masterbelt
# monorepo (toolchain/grammars/tree-sitter-masterbelt/.github), not here.
name: release-pypi

on:
  push:
    tags: ['v*']

concurrency:
  group: release-pypi-${{ github.ref }}

permissions:
  contents: read

jobs:
  wheels:
    if: ${{ !contains(github.ref_name, '-') }} # stable tags only
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0
        env:
          # Override the pyproject default (cp310 only) to cover current CPython.
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): configure the project on PyPI to trust this
    # repo's `release-pypi` workflow and the `pypi` environment — no API token is
    # created or stored. The environment also records each publish in Deployments.
    environment:
      name: pypi
      url: https://pypi.org/project/tree-sitter-masterbelt/
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
